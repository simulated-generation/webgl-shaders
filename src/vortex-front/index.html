<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Enter the Vortex</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1c24" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/vortex.css" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <main class="vortex-container paused">
        <header class="title">
            Enter the Vortex
        </header>

        <div class="vortex-stage">
            <div class="vortex"></div>
            <button id="playButton" aria-label="Play">▶</button>
        </div>

        <footer class="status-area">
            <span id="status-text">PAUSED</span>
        </footer>
    </main>

    <audio id="audio" preload="none" style="display:none;"></audio>

    <script src="js/vortex.js"></script>
</body>
</html>
