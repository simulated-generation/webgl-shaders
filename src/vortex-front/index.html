<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Radio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
</head>
<body>

    <main class="app-container">
        <header class="branding">
            <h1>VORTEX RADIO</h1>
            <div class="glow-line"></div>
        </header>

        <section class="vortex-stage">
            <div class="vortex" id="vortex-visual"></div>
            
            <button id="play-btn" aria-label="Toggle Playback">
                <svg id="play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <svg id="pause-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none;">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            </button>
        </section>

        <footer class="status-area">
            <span id="status-text">OFFLINE</span>
            <div class="indicator"></div>
        </footer>
    </main>

    <audio id="audio" preload="none"></audio>
    <script src="js/app.js"></script>
</body>
</html>
