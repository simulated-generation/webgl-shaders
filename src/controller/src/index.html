<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
  <title>Virtualctl - OSC messages for hyperreality</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json" />
  <script type="module" src="../lib/webaudio-controls.js"></script>
</head>
<body>
  <div class="app">
    <div class="menu">
      <div class="layoutnav">
        <button id="prevLayout" aria-label="Previous layout">◀</button>
        <div id="layoutTitle">…</div>
        <button id="nextLayout" aria-label="Next layout">▶</button>
      </div>

      <button id="reloadbutton" onclick="reload()">RELOAD</button>
    </div>

    <!-- This becomes the single render target for *any* layout -->
    <div class="controls"></div>
  </div>

  <script>
    function reload() {
      window.location.reload();
    }
  </script>
  <script type="module" src="./app.js"></script>
</body>
</html>
