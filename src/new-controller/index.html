<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Minimal Control App</title>

  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" href="/icons/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="shortcut icon" href="/icons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="VirtualCTL" />
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <div class="app">
    <div class="panel" role="application" aria-label="Minimal control app">

      <header class="controls">
        <button class="btn small" id="btnShot" aria-label="Take screenshot" title="Screenshot">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="5" y="8" width="14" height="10" rx="1"></rect>
            <path d="M9 8l1.2-2h3.6L15 8"></path>
            <circle cx="12" cy="13" r="3.2" stroke-width="20%"></circle>
          </svg>
        </button>

        <button class="btn small" id="btnVid" aria-label="Start video" title="Video">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="5.5"></circle>
            <circle cx="12" cy="12" r="1.2"></circle>
          </svg>
        </button>

        <button class="btn small" id="btnTheme" aria-label="Toggle dark mode" title="Theme">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="5"></circle>
            <path d="M12 2v2.5"></path>
            <path d="M12 19.5V22"></path>
            <path d="M2 12h2.5"></path>
            <path d="M19.5 12H22"></path>
          </svg>
        </button>

        <button class="btn small" id="btnSync" aria-label="Enable sync" title="Sync">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 8a6 6 0 0 1 10-1"></path>
            <path d="M17 5v4h-4"></path>
            <path d="M17 16a6 6 0 0 1-10 1"></path>
            <path d="M7 19v-4h4"></path>
          </svg>
        </button>

        <button class="btn small" id="btnInfo" aria-label="About and join QR" title="Info">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="8"></circle>
            <path d="M12 10v6"></path>
            <path d="M12 7.5h.01"></path>
          </svg>
        </button>

      </header>

      <main class="faders" aria-label="Faders">
        <div class="fader-row"><input data-path="/virtualctl/F001" type="range" min="0" max="1" step="0.00390625" value="0.1" aria-label="Fader 1"></div>
        <div class="fader-row"><input data-path="/virtualctl/F002" type="range" min="0" max="1" step="0.00390625" value="0.2"  aria-label="Fader 2"></div>
        <div class="fader-row"><input data-path="/virtualctl/F003" type="range" min="0" max="1" step="0.00390625" value="0.3"  aria-label="Fader 3"></div>
        <div class="fader-row"><input data-path="/virtualctl/F004" type="range" min="0" max="1" step="0.00390625" value="0.4"  aria-label="Fader 4"></div>
        <div class="fader-row"><input data-path="/virtualctl/F005" type="range" min="0" max="1" step="0.00390625" value="0.5"  aria-label="Fader 5"></div>
        <div class="fader-row"><input data-path="/virtualctl/F006" type="range" min="0" max="1" step="0.00390625" value="0.6"  aria-label="Fader 6"></div>
        <div class="fader-row"><input data-path="/virtualctl/F007" type="range" min="0" max="1" step="0.00390625" value="0.7"  aria-label="Fader 7"></div>
        <div class="fader-row"><input data-path="/virtualctl/F008" type="range" min="0" max="1" step="0.00390625" value="0.8"  aria-label="Fader 8"></div>
        <div class="fader-row"><input data-path="/virtualctl/F009" type="range" min="0" max="1" step="0.00390625" value="0.9"  aria-label="Fader 9"></div>
        <div class="fader-row"><input data-path="/virtualctl/F010" type="range" min="0" max="1" step="0.00390625" value="1.0"  aria-label="Fader 10"></div>
      </main>
    </div>

    <div class="overlay hidden" id="imageOverlay" aria-hidden="true">
      <div class="overlay-backdrop"></div>

      <div class="overlay-panel" id="imageOverlayPanel" role="dialog" aria-modal="true" aria-label="Captured image preview">
        <div class="overlay-image-wrap">
          <img id="overlayImage" alt="Captured shader image preview" />
        </div>

        <div class="overlay-actions">
          <button class="btn small" id="btnOverlaySave" type="button" aria-label="Save image" title="Save">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 4v11"></path>
              <path d="M8.5 11.5L12 15l3.5-3.5"></path>
              <path d="M5 19h14"></path>
            </svg>
          </button>

          <button class="btn small" id="btnOverlayShare" type="button" aria-label="Share image" title="Share">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="18" cy="5" r="2"></circle>
              <circle cx="6" cy="12" r="2"></circle>
              <circle cx="18" cy="19" r="2"></circle>
              <path d="M8 12l8-6"></path>
              <path d="M8 12l8 6"></path>
            </svg>
          </button>

          <button class="btn small" id="btnOverlayCancel" type="button" aria-label="Close preview" title="Close">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6l12 12"></path>
              <path d="M18 6L6 18"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="overlay hidden" id="infoOverlay" aria-hidden="true">
      <div class="overlay-backdrop"></div>

      <div
          class="overlay-panel info-overlay-panel"
          id="infoOverlayPanel"
          role="dialog"
          aria-modal="true"
          aria-label="About this app"
          >
          <div class="info-overlay-content">

            <div class="info-title">
              <h1>PIXELOR 3000</h1>
              <p class="info-subtitle">Art &amp; Code by <strong>Simulated Generation</strong></p>
            </div>

            <div class="info-icons">
              <a
                  class="info-icon"
                  href="https://www.instagram.com/simulatedgeneration/"
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label="Simulated Generation on Instagram"
                  title="Instagram"
                  >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="4" y="4" width="16" height="16" rx="4"></rect>
                    <circle cx="12" cy="12" r="4"></circle>
                    <circle cx="17" cy="7" r="1.2"></circle>
                  </svg>
              </a>

              <a
                  class="info-icon"
                  href="https://www.youtube.com/@SimulatedGeneration"
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label="Simulated Generation on YouTube"
                  title="YouTube"
                  >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="3" y="7" width="18" height="10" rx="3"></rect>
                    <path d="M10 9.5l5 2.5-5 2.5z"></path>
                  </svg>
              </a>
            </div>

            <div class="info-credit">
              <p>Controller design by <strong>Odjin.art</strong></p>

              <a
                  class="info-icon"
                  href="https://www.instagram.com/odjin.art/"
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label="Odjin on Instagram"
                  title="Instagram"
                  >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="4" y="4" width="16" height="16" rx="4"></rect>
                    <circle cx="12" cy="12" r="4"></circle>
                    <circle cx="17" cy="7" r="1.2"></circle>
                  </svg>
              </a>
            </div>

            <div class="overlay-actions">
              <button class="btn small" id="btnInfoClose" type="button" aria-label="Close info" title="Close">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M6 6l12 12"></path>
                  <path d="M18 6L6 18"></path>
                </svg>
              </button>
            </div>
          </div>

      </div>
    </div>



  <script type="module" src="./app.js"></script>
</body>
</html>
